<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>比赛详情 | MatchBuzz</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-badge">MB</div>
          <div>
            <p class="eyebrow">比赛详情</p>
            <h1>MatchBuzz</h1>
          </div>
        </div>
        <nav class="topnav">
          <a href="/zh/index.html">首页</a>
          <a href="/zh/matches.html">赛事</a>
          <a href="/zh/index.html#studio">生成台</a>
          <a href="/zh/about.html">项目介绍</a>
          <a href="/zh/admin.html">控制台</a>
        </nav>
        <div class="locale-switcher-inline">
          <label for="locale-switcher">语言</label>
          <select id="locale-switcher" data-page="match">
            <option value="en">English</option>
            <option value="zh" selected>中文</option>
          </select>
        </div>
      </header>

      <main class="page-stack">
        <section class="panel fixture-hero">
          <div id="match-hero" class="fixture-hero-inner empty-state">
            <p>正在加载比赛详情...</p>
          </div>
        </section>

        <section class="detail-grid">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">概览</p>
                <h4>比赛上下文</h4>
              </div>
            </div>
            <div id="match-meta" class="meta-grid"></div>
            <ul id="match-facts" class="facts-list"></ul>
            <div class="ops-actions">
              <a id="open-studio-link" class="button button-primary" href="/zh/index.html#studio">带入生成台</a>
              <a class="button button-secondary" href="/zh/matches.html">返回赛事列表</a>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">积分榜</p>
                <h4>联赛快照</h4>
              </div>
            </div>
            <div id="table-list" class="table-list empty-state">
              <p>正在加载积分榜...</p>
            </div>
          </article>
        </section>

        <section class="detail-grid">
          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">最近结果</p>
                <h4>最近结束的比赛</h4>
              </div>
            </div>
            <div id="recent-list" class="mini-fixture-list empty-state">
              <p>正在加载最近比赛...</p>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">更多赛程</p>
                <h4>同一数据源下的后续比赛</h4>
              </div>
            </div>
            <div id="upcoming-list" class="mini-fixture-list empty-state">
              <p>正在加载后续比赛...</p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="/match.js" defer></script>
    <script src="/locale-switcher.js" defer></script>
  </body>
</html>
