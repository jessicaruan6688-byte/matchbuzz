services:
  - type: web
    name: matchbuzz
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: APP_HOST
        value: 0.0.0.0
      - key: GMI_API_URL
        value: https://api.gmi-serving.com/v1/chat/completions
      - key: GMI_MODEL
        value: MiniMaxAI/MiniMax-M2.7
      - key: GMI_API_KEY
        sync: false
      - key: SITE_URL
        sync: false
      - key: DATA_DIR
        sync: false
